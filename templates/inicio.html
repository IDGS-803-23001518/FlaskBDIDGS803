{% extends "layout.html" %}

{% block container %}

<div class="welcome-container">
    <div class="welcome-card">
        <div class="icon-wrapper">
            <svg class="welcome-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
            </svg>
        </div>
        
        <h1>¡Bienvenido!</h1>
        <p class="welcome-text">Nos alegra tenerte aquí. Explora todas las funcionalidades que tenemos preparadas para ti.</p>
        
    </div>
</div>

<style>
.welcome-container {
    min-height: 80vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    padding: 150px;
    animation: gradientBG 15s ease infinite;
    background-size: 400% 400%;
}

@keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

.welcome-card {
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(10px);
    border-radius: 24px;
    padding: 50px 40px;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
    max-width: 500px;
    width: 100%;
    text-align: center;
    transform: translateY(0);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    border: 1px solid rgba(255, 255, 255, 0.2);
}

.welcome-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 35px 60px -15px rgba(0, 0, 0, 0.3);
}

.icon-wrapper {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    width: 80px;
    height: 80px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 25px;
    animation: float 3s ease-in-out infinite;
}

@keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-10px); }
    100% { transform: translateY(0px); }
}

.welcome-icon {
    width: 45px;
    height: 45px;
    color: white;
}

.welcome-card h1 {
    font-size: 2.5em;
    margin-bottom: 15px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    font-weight: 700;
}

.welcome-text {
    color: #4a5568;
    font-size: 1.1em;
    line-height: 1.6;
    margin-bottom: 30px;
}

.features-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 15px;
    margin: 30px 0;
    padding: 20px 0;
    border-top: 2px solid #edf2f7;
    border-bottom: 2px solid #edf2f7;
}

.feature-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px;
    background: #f7fafc;
    border-radius: 12px;
    transition: all 0.3s ease;
    cursor: default;
}

.feature-item:hover {
    background: linear-gradient(135deg, #667eea20 0%, #764ba220 100%);
    transform: scale(1.05);
}

.feature-icon {
    font-size: 1.3em;
}

.feature-item span:last-child {
    color: #2d3748;
    font-weight: 500;
    font-size: 0.95em;
}

.btn-primary {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 14px 32px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    text-decoration: none;
    border-radius: 50px;
    font-weight: 600;
    font-size: 1.1em;
    transition: all 0.3s ease;
    box-shadow: 0 10px 20px -8px rgba(102, 126, 234, 0.6);
    border: 2px solid transparent;
}

.btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 15px 25px -8px rgba(102, 126, 234, 0.8);
    background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
}

.btn-primary:active {
    transform: translateY(0);
}

.btn-icon {
    width: 20px;
    height: 20px;
    transition: transform 0.3s ease;
}

.btn-primary:hover .btn-icon {
    transform: translateX(5px);
}

.help-text {
    margin-top: 25px;
    color: #718096;
    font-size: 0.95em;
}

.help-text a {
    color: #667eea;
    text-decoration: none;
    font-weight: 600;
    transition: color 0.3s ease;
}

.help-text a:hover {
    color: #764ba2;
    text-decoration: underline;
}

/* Responsive Design */
@media (max-width: 640px) {
    .welcome-card {
        padding: 30px 20px;
    }
    
    .welcome-card h1 {
        font-size: 2em;
    }
    
    .features-grid {
        grid-template-columns: 1fr;
    }
    
    .feature-item {
        justify-content: center;
    }
}

/* Animación de entrada */
@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.welcome-card {
    animation: fadeInUp 0.8s ease-out;
}
</style>

{% endblock %}
